<!DOCTYPE html>
<html>
<head>
    <title>Assignment-2</title>
</head>
<body>
    <h1>FORMS</h1>
    <form>

        <label>Name</label>
        <input type="text" placeholder="Name">
        <br><br>

        <label>Email-id</label>
        <input type="email" placeholder="Email-id">
        <br><br>

        <label>Password</label>
        <input type="password" placeholder="Password">
        <br><br>

        <label>Language</label>
        <br><br>

        <input type="radio" name="language" id="html">
        <label for="html">HTML</label>
        <br>

        <input type="radio" name="language" id="css">
        <label for="css">CSS</label>
        <br>

        <input type="radio" name="language" id="js">
        <label for="js">JS</label>

        <br><br><br>

        <label>Course</label>
        <br><br>

        <input type="checkbox" id="java">
        <label for="java">Java Stack</label>
        <br>

        <input type="checkbox" id="ds">
        <label for="ds">Data Science</label>
        <br>

        <input type="checkbox" id="mern">
        <label for="mern">Mern Stack</label>

        <br><br><br>

        <label>Field:</label>
        <br><br>

        <select>
            <option selected>Select</option>
            <option>HTML</option>
            <option>CSS</option>
            <option>JS</option>
        </select>

        <br><br><br>

        <textarea rows="3" cols="25" placeholder="Describe yourself"></textarea>

        <br><br>

        <label>Date</label>
        <br><br>

        <input type="date">

        <br><br>

        <label>Phone No.</label>
        <input type="tel" placeholder="Phone NO.">

        <br><br>

        <input type="submit" value="submit">

    </form>

</html>
